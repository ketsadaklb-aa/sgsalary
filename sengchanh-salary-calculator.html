    // ─── USER ROW (inline password change) ───────────────────────────────────
    const UserRow = ({ u, currentUser, onDelete, onChangePassword }) => {
      const [editing, setEditing] = useState(false);
      const [newPw, setNewPw] = useState('');
      const isSelf = u.username === currentUser;
      return (
        <div className={`flex items-center gap-3 px-4 py-3 rounded-2xl border ${isSelf ? 'bg-indigo-50 border-indigo-200' : 'bg-slate-50 border-slate-200'}`}>
          <span className="text-lg">{u.role === 'admin' ? '👑' : '👤'}</span>
          <div className="flex-1 min-w-0">
            <p className="font-black text-sm text-slate-800">{u.username} {isSelf && <span className="text-indigo-500 text-[10px] font-bold">(you)</span>}</p>
            <p className="text-[10px] text-slate-400 font-bold uppercase">{u.role}</p>
          </div>
          {editing ? (
            <div className="flex items-center gap-2">
              <input type="text" value={newPw} onChange={e => setNewPw(e.target.value)}
                className="p-1.5 border-2 rounded-lg font-bold text-sm focus:border-indigo-400 outline-none w-32"
                placeholder="new password" autoFocus />
              <button onClick={() => { onChangePassword(u.username, newPw); setEditing(false); setNewPw(''); }}
                className="bg-emerald-600 text-white text-[10px] font-black px-3 py-1.5 rounded-lg transition-all active:scale-95">Save</button>
              <button onClick={() => { setEditing(false); setNewPw(''); }}
                className="text-slate-400 hover:text-slate-600 font-black text-lg leading-none">×</button>
            </div>
          ) : (
            <div className="flex items-center gap-2">
              <button onClick={() => setEditing(true)}
                className="bg-slate-200 hover:bg-slate-300 text-slate-700 text-[10px] font-black px-3 py-1.5 rounded-lg transition-all active:scale-95">
                🔑 Password
              </button>
              {!isSelf && (
                <button onClick={() => onDelete(u.username)}
                  className="bg-rose-100 hover:bg-rose-200 text-rose-600 text-[10px] font-black px-3 py-1.5 rounded-lg transition-all active:scale-95">
                  🗑️
                </button>
              )}
            </div>
          )}
        </div>
      );
    };

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [authSession, setAuthSessionState] = useState(getAuthSession);
      const [authUsers, setAuthUsers] = useState([]);
      const [newUserForm, setNewUserForm] = useState({ username: '', password: '', role: 'user' });
      const [userMsg, setUserMsg] = useState('');
      const [cloudSync, setCloudSync] = useState(false);
      const [appLoading, setAppLoading] = useState(true);

      const [tab, setTab] = useState("upload");
      const [employees, setEmployees] = useState(loadEmployees);
      const [monthCfg, setMonthCfg] = useState(loadMonthCfg);
      const [results, setResults] = useState(null);
      const [status, setStatus] = useState("");
      const [editCode, setEditCode] = useState(null);
      const [selectedEmp, setSelectedEmp] = useState(null);
      const [slipEmp, setSlipEmp] = useState(null);
      const [showConfirm, setShowConfirm] = useState(null);
      const [sessions, setSessions] = useState(loadSessions);
      const [showSaveSession, setShowSaveSession] = useState(false);
      const [sessionName, setSessionName] = useState("");
      const [saveConflict, setSaveConflict] = useState(null); // existing session that matches current month
      const fileRef = useRef();
      const combinedDataRef = useRef(null);
      const initialLoadDone = useRef(false);

      const [lastSaved, setLastSaved] = useState(null);
      const markSaved = () => setLastSaved(new Date().toLocaleTimeString("lo-LA", { hour: "2-digit", minute: "2-digit", second: "2-digit" }));
      const [bulkGenerating, setBulkGenerating] = useState(false);
      const [bulkProgress, setBulkProgress] = useState(0);
      const [showNewMonth, setShowNewMonth] = useState(false);
      const [newMonthDraft, setNewMonthDraft] = useState(null);

      // Auto-save to cloud + localStorage (skip during initial load)
      useEffect(() => {
        if (!initialLoadDone.current) return;
        saveEmployees(employees); markSaved();
        apiCall('POST', '/api/config/employees', { value: employees });
      }, [employees]);
      useEffect(() => {
        if (!initialLoadDone.current) return;
        saveMonthCfg(monthCfg); markSaved();
        apiCall('POST', '/api/config/monthCfg', { value: monthCfg });
      }, [monthCfg]);

      // Initial load: fetch all data from cloud, fall back to localStorage
      useEffect(() => {
        if (!authSession) { setAppLoading(false); return; }
        Promise.all([
          apiCall('GET', '/api/config/employees'),
          apiCall('GET', '/api/config/monthCfg'),
          apiCall('GET', '/api/sessions'),
          apiCall('GET', '/api/users'),
        ]).then(async ([empsRes, cfgRes, sessionsRes, usersRes]) => {
          if (empsRes.ok && empsRes.data) { setEmployees(empsRes.data); localStorage.setItem("ssc_employees", JSON.stringify(empsRes.data)); }
          if (cfgRes.ok && cfgRes.data)   { setMonthCfg(cfgRes.data);  localStorage.setItem("ssc_monthCfg",  JSON.stringify(cfgRes.data));  }
          if (sessionsRes.ok && sessionsRes.data) { setSessions(sessionsRes.data); localStorage.setItem("ssc_sessions", JSON.stringify(sessionsRes.data)); }
          if (usersRes.ok && usersRes.data) setAuthUsers(usersRes.data);
          setCloudSync(empsRes.ok);
          // Restore active work from DB (primary) then localStorage (fallback)
          const activeRes = await apiCall('GET', `/api/active-work?u=${encodeURIComponent(authSession.username)}`);
          const activeData = activeRes.ok && activeRes.data ? activeRes.data.scanData : loadCurrentScanData();
          if (activeData) {
            combinedDataRef.current = activeData;
            const emps = empsRes.ok && empsRes.data ? empsRes.data : loadEmployees();
            const cfg  = (activeRes.ok && activeRes.data?.monthCfg) || (cfgRes.ok && cfgRes.data) || loadMonthCfg();
            const res = {};
            emps.forEach(emp => {
              const empData = activeData[emp.code] || [];
              if (empData.some(row => row.scans.some(s => s !== null)))
                res[emp.code] = computeSalary(emp, empData, cfg);
            });
            if (Object.keys(res).length > 0) { setResults(res); setStatus("✅ ໂຫລດຂໍ້ມູນທີ່ save ໄວ້ແລ້ວ"); }
          }
          initialLoadDone.current = true;
          setAppLoading(false);
        }).catch(() => {
          // Full localStorage fallback
          const data = loadCurrentScanData();
          if (data) {
            combinedDataRef.current = data;
            const emps = loadEmployees(); const cfg = loadMonthCfg();
            const res = {};
            emps.forEach(emp => {
              const empData = data[emp.code] || [];
              if (empData.some(row => row.scans.some(s => s !== null)))
                res[emp.code] = computeSalary(emp, empData, cfg);
            });
            if (Object.keys(res).length > 0) { setResults(res); setStatus("✅ ໂຫລດຂໍ້ມູນທີ່ save ໄວ້ແລ້ວ"); }
          }
          setCloudSync(false);
          initialLoadDone.current = true;
          setAppLoading(false);
        });
      }, []);

      // Recompute results in real-time whenever employees or monthCfg changes
      useEffect(() => {
        if (!combinedDataRef.current) return;
        const res = {};
        employees.forEach(emp => {
          const data = combinedDataRef.current[emp.code] || [];
          const hasValidScans = data.some(row => row.scans.some(s => s !== null));
          if (hasValidScans) res[emp.code] = computeSalary(emp, data, monthCfg);
        });
        setResults(res);
      }, [employees, monthCfg]);

      // Keep open modals in sync when results recompute
      useEffect(() => {
        if (!results) return;
        if (selectedEmp && results[selectedEmp.code]) setSelectedEmp(results[selectedEmp.code]);
        if (slipEmp && results[slipEmp.code]) setSlipEmp(results[slipEmp.code]);
      }, [results]);

      const processFiles = useCallback(async (files) => {
        if (!files.length) return;
        setStatus("ກຳລັງປະມວນຜົນ...");

        // ── Date-format detection & normalisation ─────────────────────────────────────────────
        // Supports D/M/YYYY, M/D/YYYY and YYYY-MM-DD from any biometric export.
        // Detection: first part >12 → D/M/Y; second part >12 → M/D/Y;
        // both ≤12 → compare first part against configured month.
        const detectSlashFmt = (samples) => {
          for (const s of samples) {
            if (!s || s.includes('-')) continue;
            const p = s.split('/');
            if (p.length !== 3) continue;
            const a = Number(p[0]), b = Number(p[1]);
            if (a > 12) return 'dmy';
            if (b > 12) return 'mdy';
          }
          const ref = samples.find(s => s && !s.includes('-') && s.split('/').length === 3);
          if (ref && Number(ref.split('/')[0]) === monthCfg.month) return 'mdy';
          return 'dmy';
        };
        const toISO = (raw, fmt) => {
          if (!raw) return raw;
          if (raw.includes('-')) return raw;
          const p = raw.split('/');
          if (p.length !== 3) return raw;
          const [a, b, c] = p.map(Number);
          const [d, m, y] = fmt === 'mdy' ? [b, a, c] : [a, b, c];
          if (!d || !m || !y) return raw;
          return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        };
        // ─────────────────────────────────────────────────────────────────────────────

        // First pass: collect raw date strings to detect slash format
        const rawSamples = [];
        for (const file of files) {
          const text = await file.text();
          const result = window.Papa.parse(text, { header: false, skipEmptyLines: true });
          result.data.slice(1).forEach(r => { const ds = r[4]?.toString().trim(); if (ds) rawSamples.push(ds); });
        }
        const slashFmt = detectSlashFmt(rawSamples);

        const combinedData = {};
        employees.forEach(e => combinedData[e.code] = []);
        // track employees discovered in CSV but not in our list
        const discoveredEmps = {};
        for (const file of files) {
          const text = await file.text();
          const result = window.Papa.parse(text, { header: false, skipEmptyLines: true });
          result.data.slice(1).forEach(r => {
            if (r.length < 6) return;
            const code = r[0].toString().trim().replace(/^\uFEFF/, "");
            if (!code) return;
            // auto-discover new employees found in CSV
            if (combinedData[code] === undefined) {
              combinedData[code] = [];
              if (!discoveredEmps[code]) {
                const name = r[1]?.toString().trim() || r[2]?.toString().trim() || `EMP-${code}`;
                discoveredEmps[code] = { code, name, scan: 4, base: 0, special_bonus: 0, advance: 0 };
              }
            }
            const rawDate = r[4]?.toString().trim();
            if (!rawDate) return;
            const dateStr = toISO(rawDate, slashFmt); // normalised to YYYY-MM-DD
            const scans = Array.from({ length: 5 }, (_, j) => parseTime(r[5 + j]?.toString() || ""));
            if (!combinedData[code].some(row => row.dateStr === dateStr))
              combinedData[code].push({ dateStr, scans });
          });
        }
        // Auto-detect scan mode for newly discovered employees
        Object.values(discoveredEmps).forEach(emp => {
          emp.scan = detectScanMode(combinedData[emp.code] || []);
        });
        const allEmps = [...employees, ...Object.values(discoveredEmps)];

        // Auto-fill month / year / totalDays from normalised YYYY-MM-DD dates
        let detectedCfg = monthCfg;
        const allDateStrs = Object.values(combinedData).flat().map(r => r.dateStr).filter(Boolean);
        if (allDateStrs.length > 0) {
          const parts = allDateStrs[0].split('-'); // guaranteed YYYY-MM-DD
          if (parts.length === 3) {
            const csvYear = Number(parts[0]), csvMonth = Number(parts[1]);
            if (csvMonth >= 1 && csvMonth <= 12 && csvYear >= 2020) {
              const csvTotalDays = new Date(csvYear, csvMonth, 0).getDate();
              const laoLabel = `${LAO_MONTHS[csvMonth - 1]} ${csvYear}`;
              detectedCfg = { ...monthCfg, month: csvMonth, year: csvYear, totalDays: csvTotalDays, label: laoLabel };
              setMonthCfg(detectedCfg);
            }
          }
        }

        // Store raw scan data so results can be recomputed when settings change
        combinedDataRef.current = combinedData;
        saveCurrentScanData(combinedData);
        const res = {};
        allEmps.forEach(emp => {
          const data = combinedData[emp.code] || [];
          const hasValidScans = data.some(row => row.scans.some(s => s !== null));
          if (hasValidScans) res[emp.code] = computeSalary(emp, data, detectedCfg);
        });
        setResults(res);
        // Save active work to DB (no more localStorage-only)
        saveCurrentScanData(combinedData); // keep local cache too
        apiCall('POST', '/api/active-work', { username: authSession.username, scanData: combinedData, monthCfg: detectedCfg });
        // Merge newly discovered employees into state so they appear in Settings
        const newlyFound = Object.values(discoveredEmps);
        if (newlyFound.length > 0) {
          setEmployees(prev => {
            const existingCodes = new Set(prev.map(e => e.code));
            const toAdd = newlyFound.filter(e => !existingCodes.has(e.code));
            return toAdd.length > 0 ? [...prev, ...toAdd] : prev;
          });
        }
        setStatus(`✅ ຄຳນວນສຳເລັດ ${Object.keys(res).length} ຄົນ`);
        setTab("results");
      }, [employees, monthCfg]);

      const handleSaveClick = () => {
        if (!combinedDataRef.current) return;
        const existing = sessions.find(s => s.label === monthCfg.label);
        if (existing) {
          setSaveConflict(existing); // show replace/new modal
        } else {
          saveCurrentSession(null); // save directly, no modal
        }
      };

      const saveCurrentSession = async (replaceId) => {
        if (!combinedDataRef.current) return;
        // If replacing, delete the old session first
        if (replaceId) await apiCall('DELETE', `/api/sessions/${replaceId}`);
        const label = monthCfg.label;
        const newSession = {
          id: Date.now(), label, monthCfg,
          scanData: combinedDataRef.current, employees,
          employeeCount: Object.keys(combinedDataRef.current).filter(code =>
            (combinedDataRef.current[code] || []).some(r => r.scans.some(s => s !== null))
          ).length,
          savedAt: new Date().toLocaleString("lo-LA", { dateStyle: "medium", timeStyle: "short" }),
        };
        await apiCall('POST', '/api/sessions', newSession);
        const r = await apiCall('GET', '/api/sessions');
        const base = replaceId ? sessions.filter(s => s.id !== replaceId) : sessions;
        const updated = r.ok && r.data ? r.data : [newSession, ...base];
        setSessions(updated);
        saveSessions(updated);
        setSaveConflict(null);
        setShowSaveSession(false);
        setStatus(`✅ Save ສຳເລັດ — ${label}`);
      };

      const exportSessions = () => {
        const blob = new Blob([JSON.stringify(sessions, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `ssc-sessions-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const importSessions = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error("Invalid format");
            const existingIds = new Set(sessions.map(s => s.id));
            const toAdd = imported.filter(s => s.id && s.label && !existingIds.has(s.id));
            const merged = [...toAdd, ...sessions];
            setSessions(merged);
            saveSessions(merged);
            setStatus(`✅ Import ສຳເລັດ — ເພີ່ມ ${toAdd.length} session`);
          } catch {
            setStatus("❌ ໄຟລ໌ JSON ບໍ່ຖືກຕ້ອງ");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const loadSession = (session) => {
        setMonthCfg(session.monthCfg);
        setEmployees(session.employees);
        combinedDataRef.current = session.scanData;
        saveCurrentScanData(session.scanData);
        const res = {};
        session.employees.forEach(emp => {
          const data = session.scanData[emp.code] || [];
          if (data.some(row => row.scans.some(s => s !== null)))
            res[emp.code] = computeSalary(emp, data, session.monthCfg);
        });
        setResults(res);
        setStatus(`✅ ໂຫລດ "${session.label}" ສຳເລັດ — ${session.employeeCount} ຄົນ`);
        setTab("results");
      };

      const deleteSession = async (id) => {
        await apiCall('DELETE', `/api/sessions/${id}`);
        const updated = sessions.filter(s => s.id !== id);
        setSessions(updated);
        saveSessions(updated);
      };

      const clearCurrentWork = () => {
        combinedDataRef.current = null;
        localStorage.removeItem("ssc_currentScanData");
        apiCall('DELETE', '/api/active-work', { username: authSession.username });
        setResults(null);
        setStatus("");
        setTab("upload");
      };

      const LAO_MONTHS = ["ມັງກອນ","ກຸມພາ","ມີນາ","ເມສາ","ພຶດສະພາ","ມິຖຸນາ","ກໍລະກົດ","ສິງຫາ","ກັນຍາ","ຕຸລາ","ພະຈິກ","ທັນວາ"];

      const nextMonthCfg = () => {
        const m = monthCfg.month === 12 ? 1 : monthCfg.month + 1;
        const y = monthCfg.month === 12 ? monthCfg.year + 1 : monthCfg.year;
        return { ...monthCfg, month: m, year: y, label: `${LAO_MONTHS[m - 1]} ${y}`, totalDays: new Date(y, m, 0).getDate(), holidays: [] };
      };

      const openNewMonth = () => {
        setNewMonthDraft(nextMonthCfg());
        setShowNewMonth(true);
      };

      const startNewMonth = () => {
        setMonthCfg(newMonthDraft);
        setEmployees(prev => prev.map(e => ({ ...e, advance: 0, special_bonus: 0 })));
        combinedDataRef.current = null;
        localStorage.removeItem("ssc_currentScanData");
        apiCall('DELETE', '/api/active-work', { username: authSession.username });
        setResults(null);
        setStatus(`✅ ພ້ອມສຳລັບ ${newMonthDraft.label} — ອັບໂຫລດ CSV ໄດ້ເລີຍ`);
        setShowNewMonth(false);
        setNewMonthDraft(null);
        setTab("upload");
      };

      const updateDraftMonth = (field, val) => {
        setNewMonthDraft(prev => {
          const next = { ...prev, [field]: val };
          if (field === 'month' || field === 'year') {
            const m = field === 'month' ? Number(val) : prev.month;
            const y = field === 'year'  ? Number(val) : prev.year;
            if (m >= 1 && m <= 12 && y >= 2020) {
              next.totalDays = new Date(y, m, 0).getDate();
              next.label = `${LAO_MONTHS[m - 1]} ${y}`;
            }
          }
          return next;
        });
      };

      const computedSundays = (() => { let s = 0; for (let d = 1; d <= monthCfg.totalDays; d++) if (new Date(monthCfg.year, monthCfg.month - 1, d).getDay() === 0) s++; return s; })();
      const sundayDates = (() => { const a = []; for (let d = 1; d <= monthCfg.totalDays; d++) if (new Date(monthCfg.year, monthCfg.month - 1, d).getDay() === 0) a.push(d); return a; })();
      const rateDays = monthCfg.totalDays - computedSundays;
      const workingDays = rateDays - (monthCfg.holidays || []).filter(h => { const d = typeof h === 'object' ? Number(h.date) : Number(h); return d >= 1 && d <= monthCfg.totalDays; }).length;
      const orderedResults = results ? Object.entries(results).sort((a, b) => parseInt(a[0]) - parseInt(b[0])) : [];
      const totals = orderedResults.reduce((acc, [, r]) => ({
        totalGross: acc.totalGross + r.totalGross,
        advance: acc.advance + (r.advance || 0),
        netPay: acc.netPay + r.netPay,
        workPay: acc.workPay + r.workPay,
        otPay: acc.otPay + r.otPay,
        specialBonus: acc.specialBonus + (r.special_bonus || 0),
        otBonus: acc.otBonus + r.otBonus,
      }), { totalGross:0, advance:0, netPay:0, workPay:0, otPay:0, specialBonus:0, otBonus:0 });

      const resetAllAdvances = () => { setEmployees(employees.map(e => ({ ...e, advance: 0, advance_note: '' }))); setShowConfirm(null); };
      const resetAllSpecialBonuses = () => { setEmployees(employees.map(e => ({ ...e, special_bonus: 0 }))); setShowConfirm(null); };

      const generateBulkPDF = async () => {
        setBulkGenerating(true);
        setBulkProgress(0);
        const zip = new window.JSZip();
        const list = orderedResults;
        for (let i = 0; i < list.length; i++) {
          const [, r] = list[i];
          setBulkProgress(i + 1);
          const container = document.createElement('div');
          container.style.cssText = 'position:fixed;left:-99999px;top:0;width:794px;background:white;';
          document.body.appendChild(container);
          const root = ReactDOM.createRoot(container);
          await new Promise(resolve => {
            root.render(React.createElement(SlipBody, { emp: r, monthCfg }));
            setTimeout(resolve, 400);
          });
          try {
            const canvas = await html2canvas(container.firstChild, { scale: 1.5, useCORS: true, backgroundColor: '#ffffff' });
            const pdf = canvasToSlipPDF(canvas);
            zip.file(`${String(r.code).padStart(2,'0')}_${r.name}_${monthCfg.label}.pdf`, pdf.output('blob'));
          } catch(e) { console.error(r.name, e); }
          root.unmount();
          document.body.removeChild(container);
        }
        const blob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `salary-slips-${monthCfg.label}.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setBulkGenerating(false);
        setBulkProgress(0);
      };

      // ── Auth helpers (after all hooks) ──────────────────────────────────────
      const logout = () => { clearAuthSession(); setAuthSessionState(null); };
      const refreshUsers = async () => {
        const r = await apiCall('GET', '/api/users');
        if (r.ok && r.data) setAuthUsers(r.data);
      };
      const addUser = async () => {
        const u = newUserForm.username.trim(), p = newUserForm.password.trim();
        if (!u || !p) { setUserMsg('ກະລຸນາໃສ່ຊື່ ແລະ ລະຫັດ'); return; }
        const r = await apiCall('POST', '/api/users', { username: u, password: p, role: newUserForm.role });
        if (r.ok) {
          setNewUserForm({ username: '', password: '', role: 'user' });
          setUserMsg(`✅ ເພີ່ມ "${u}" ສຳເລັດ`);
          refreshUsers();
        } else { setUserMsg(r.data?.error || 'ເກີດຂໍ້ຜິດພາດ'); }
      };
      const deleteUser = async (username) => {
        if (username === authSession?.username) { setUserMsg('ບໍ່ສາມາດລຶບຕົນເອງ'); return; }
        await apiCall('DELETE', `/api/users/${username}`);
        setUserMsg(`🗑️ ລຶບ "${username}" ແລ້ວ`);
        refreshUsers();
      };
      const changePassword = async (username, newPw) => {
        if (!newPw.trim()) return;
        await apiCall('PATCH', `/api/users/${username}/password`, { password: newPw.trim() });
        setUserMsg(`✅ ປ່ຽນລະຫັດ "${username}" ແລ້ວ`);
      };

      if (appLoading) return (
        <div className="min-h-screen bg-gradient-to-br from-blue-900 to-indigo-900 flex items-center justify-center">
          <div className="text-white text-center">
            <div className="text-5xl mb-4 animate-pulse">☁️</div>
            <p className="font-black text-xl">ກຳລັງໂຫລດຂໍ້ມູນ...</p>
            <p className="text-blue-300 text-sm mt-1 font-bold">Loading from cloud database</p>
          </div>
        </div>
      );
      if (!authSession) return <LoginScreen onLogin={(user) => setAuthSessionState(user)} />;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 pb-20">
          {/* HEADER */}
          <header className="bg-gradient-to-r from-blue-900 to-indigo-900 p-8 text-white shadow-xl">
            <div className="max-w-7xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-5">
                <div className="bg-white/10 p-4 rounded-2xl text-4xl shadow-inner">🏦</div>
                <div>
                  <h1 className="text-3xl font-black tracking-tighter uppercase">Sengchanh Salary Calculator</h1>
                  <p className="text-blue-200 text-sm font-bold opacity-80 uppercase tracking-widest">Stable v3.8 — Detailed Bonus View</p>
                </div>
              </div>
              <div className="flex items-center gap-6">
                <div className="text-right">
                  <p className="text-xs font-bold text-blue-300 uppercase">ເດືອນປະຈຸບັນ</p>
                  <p className="text-xl font-black">{monthCfg.label}</p>
                  {lastSaved && (
                    <p className="text-[10px] text-emerald-400 font-bold mt-1">✓ Auto-saved {lastSaved}</p>
                  )}
                  <p className={`text-[10px] font-bold mt-0.5 ${cloudSync ? 'text-emerald-400' : 'text-yellow-400'}`}>
                    {cloudSync ? '☁️ Cloud Synced' : '💾 Local Only'}
                  </p>
                </div>
                <div className="flex flex-col items-end gap-1.5">
                  <div className="flex items-center gap-2 bg-white/10 rounded-xl px-3 py-1.5">
                    <span className="text-lg">{authSession.role === 'admin' ? '👑' : '👤'}</span>
                    <span className="text-sm font-black text-white">{authSession.username}</span>
                  </div>
                  <button onClick={logout}
                    className="text-[10px] font-black text-blue-300 hover:text-white uppercase tracking-widest transition-colors">
                    ອອກຈາກລະບົບ / Logout
                  </button>
                </div>
              </div>
            </div>
          </header>

          {/* NAV */}
          <nav className="bg-white border-b sticky top-0 z-30 shadow-md">
            <div className="max-w-7xl mx-auto flex">
              {[
                { key: "upload",   label: "📤 ອັບໂຫລດ" },
                { key: "settings", label: "⚙️ ຕັ້ງຄ່າ" },
                { key: "results",  label: "📑 ບົດສະຫຼຸບ" },
              ].map(({ key, label }) => (
                <button key={key} onClick={() => setTab(key)}
                  className={`px-8 py-5 text-sm font-bold border-b-4 transition-all flex items-center gap-2 ${tab === key ? "bg-blue-50 text-blue-700 border-blue-700" : "text-slate-500 border-transparent hover:bg-slate-50"}`}>
                  {label}
                </button>
              ))}
            </div>
          </nav>

          <main className="max-w-7xl mx-auto p-6 lg:p-10">

            {/* ── UPLOAD TAB ─────────────────────────────────────────────── */}
            {tab === "upload" && (
              <div className="max-w-3xl mx-auto py-10 space-y-8">

                {/* Upload area */}
                <div onClick={() => fileRef.current.click()}
                  className="border-4 border-dashed rounded-[40px] p-16 bg-white cursor-pointer hover:border-blue-400 transition-all shadow-inner text-center">
                  <div className="text-7xl mb-4 opacity-30">📥</div>
                  <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Choose File (CSV)</h3>
                  <p className="text-slate-400 font-bold mb-2 italic">ລາກໄຟລ໌ CSV ຈາກເຄື່ອງສະແກນບັດ</p>
                  <input ref={fileRef} type="file" multiple className="hidden" onChange={e => processFiles(Array.from(e.target.files))} />
                </div>
                {status && <div className="p-4 bg-emerald-50 text-emerald-800 rounded-2xl font-bold border-2 border-emerald-200 text-center">{status}</div>}

                {/* Start New Month */}
                <button onClick={openNewMonth}
                  className="w-full py-4 bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-black rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3 text-sm uppercase tracking-widest">
                  <span className="text-xl">📅</span>
                  ເລີ່ມເດືອນໃໝ່ / ເຮັດໃໝ່
                </button>

                {/* Current work bar */}
                {combinedDataRef.current && (
                  <div className="bg-blue-50 border-2 border-blue-200 rounded-2xl px-6 py-4 flex items-center justify-between gap-4">
                    <div>
                      <p className="font-black text-blue-800 text-sm">💾 ມີຂໍ້ມູນໃນ Session ປະຈຸບັນ</p>
                      <p className="text-blue-500 text-xs font-bold mt-0.5">{monthCfg.label} — {results ? Object.keys(results).length : 0} ຄົນ</p>
                    </div>
                    <div className="flex gap-2 flex-shrink-0">
                      <button onClick={handleSaveClick}
                        className="bg-blue-600 hover:bg-blue-700 text-white text-xs font-black px-4 py-2 rounded-xl shadow transition-all active:scale-95">
                        💾 Save Session
                      </button>
                      <button onClick={() => setTab("results")}
                        className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-black px-4 py-2 rounded-xl shadow transition-all active:scale-95">
                        📑 ເບິ່ງ Report
                      </button>
                      <button onClick={() => setShowConfirm("clearWork")}
                        className="bg-rose-100 hover:bg-rose-200 text-rose-600 text-xs font-black px-4 py-2 rounded-xl transition-all active:scale-95">
                        🗑 Clear
                      </button>
                    </div>
                  </div>
                )}

                {/* Saved sessions */}
                <div className="bg-white rounded-3xl border shadow-xl overflow-hidden">
                  <div className="bg-slate-900 px-6 py-4 text-white flex items-center justify-between">
                    <span className="font-black uppercase tracking-widest text-xs">📂 Saved Sessions</span>
                    <div className="flex items-center gap-3">
                      <span className="text-slate-400 text-xs font-bold">{sessions.length} session{sessions.length !== 1 ? 's' : ''}</span>
                      {sessions.length > 0 && (
                        <button onClick={exportSessions}
                          className="bg-slate-700 hover:bg-slate-600 text-white text-xs font-black px-3 py-1.5 rounded-lg transition-all active:scale-95">
                          ⬇ Export
                        </button>
                      )}
                      <label className="bg-slate-700 hover:bg-slate-600 text-white text-xs font-black px-3 py-1.5 rounded-lg transition-all active:scale-95 cursor-pointer">
                        ⬆ Import
                        <input type="file" accept=".json" className="hidden" onChange={importSessions} />
                      </label>
                    </div>
                  </div>
                  {sessions.length === 0 ? (
                    <div className="p-10 text-center text-slate-400 font-bold text-sm">
                      ຍັງບໍ່ມີ session ທີ່ save ໄວ້ — ອັບໂຫລດ CSV ແລ້ວກົດ "Save Session"
                    </div>
                  ) : (
                    <div className="divide-y">
                      {sessions.map(s => (
                        <div key={s.id} className="px-6 py-4 flex items-center justify-between hover:bg-slate-50 transition-colors">

                                          <span className={used ? 'text-emerald-600' : 'text-orange-500'} title={used ? 'ໃຊ້ຄຳນວນ' : 'ຍົກເວັ້ນ'}>

                    const modalHolidayMap = new Map((monthCfg.holidays || []).map(h => typeof h === 'object' ? [Number(h.date), h.name || ''] : [Number(h), '']));
                    const rows = [];
                    for (let d = 1; d <= (selectedEmp.dataTotalDays || monthCfg.totalDays); d++) {
                      const isSun = new Date(selectedEmp.dataYear || monthCfg.year, (selectedEmp.dataMonth || monthCfg.month) - 1, d).getDay() === 0;
                      if (isSun) continue;
                      if (modalHolidayMap.has(d)) continue;
                      const log = selectedEmp.dailyLog.get(d);
                      const isAbsent = !log || log.validCount === 0 || log.countAsAbsent;
                      if (isAbsent) {
                        rows.push({ day: d, reason: 'ຂາດວຽກ (×2)', shortMins: stdMins, deduct: Math.round(2 * stdMins * selectedEmp.hourlyRate / 60) });
                      } else {
                        const payMins = selectedEmp.scanMode === 2 ? log.netM + BREAK : log.netM;
                        const shortMins = Math.max(0, stdMins - payMins);
                        if (shortMins > 0) {
                          const clusters = log.clusters || [];
                          const firstScan = clusters.length > 0 ? clusters[0][0] : null;
                          const lastC = clusters.length > 0 ? clusters[clusters.length - 1] : null;
                          const lastScan = lastC ? lastC[lastC.length - 1] : null;
                          const eveLimit = selectedEmp.shift85 ? 1020 : 1110;
                          if (selectedEmp.scanMode === 4 && (log.resolvedG !== undefined || clusters.length >= 4)) {
                            const G = log.resolvedG ?? clusters[1][clusters[1].length - 1];
                            const H = log.resolvedH ?? clusters[2][0];
                            const lunchDur = H - G;
                            const lunchExcess = Math.max(0, lunchDur - BREAK);
                            const lateMorning = firstScan !== null ? Math.max(0, firstScan - 480) : 0;
                            const earlyOut = lastScan !== null ? Math.max(0, eveLimit - lastScan) : 0;
                            if (lunchExcess > 0) rows.push({ day: d, reason: `ກິນເຂົ້າສວຍເກີນເວລາ (${lunchDur}ນທ − 40ນທ)`, shortMins: lunchExcess, deduct: Math.round(lunchExcess * selectedEmp.hourlyRate / 60) });
                            if (lateMorning > 0) rows.push({ day: d, reason: 'ມາຊ້າ', shortMins: lateMorning, deduct: Math.round(lateMorning * selectedEmp.hourlyRate / 60) });
                            if (earlyOut > 0) rows.push({ day: d, reason: 'ກັບໄວ', shortMins: earlyOut, deduct: Math.round(earlyOut * selectedEmp.hourlyRate / 60) });
                          } else {
                            const parts = [];
                            if (firstScan !== null && firstScan > 480) parts.push('ມາຊ້າ');
                            if (lastScan !== null && lastScan < eveLimit) parts.push('ກັບໄວ');
                            rows.push({ day: d, reason: parts.length > 0 ? parts.join(' + ') : 'ໜ້ອຍກວ່າມາດຕະຖານ', shortMins, deduct: Math.round(shortMins * selectedEmp.hourlyRate / 60) });

                                <td className="py-1.5 pr-3 font-bold">{r.day}</td>

                              <td colSpan={3} className="py-2 font-black text-right pr-3 text-rose-700">ລວມຫັກທັງໝົດ</td>

                  <div className="flex items-center gap-2 text-emerald-700"><span>✅</span><span>ຊື່, ເງິນເດືອນຖານ, Scan mode — ເກັບໄວ້</span></div>
                  <div className="flex items-center gap-2 text-rose-600"><span>🔄</span><span>Advance + ໂບນັດພິເສດ → 0 ທຸກຄົນ</span></div>
                  <div className="flex items-center gap-2 text-rose-600"><span>🗑</span><span>Scan data ປັດຈຸບັນ → ລ້າງ</span></div>
                  <div className="flex items-center gap-2 text-blue-600"><span>📋</span><span>ວັນພັກ → Reset (ຕ້ອງຕັ້ງໃໝ່)</span></div>
                </div>

                {unsaved && (
                  <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-4 flex items-start gap-2">
                    <span className="text-amber-500 text-lg">⚠️</span>
                    <p className="text-amber-700 font-bold text-xs">ຍັງບໍ່ໄດ້ Save Session — ຂໍ້ມູນ scan ປັດຈຸບັນຈະຫາຍຖ້າຢືນຢັນ</p>
                  </div>
                )}
                <div className="flex gap-3">
                  <button onClick={() => { setShowNewMonth(false); setNewMonthDraft(null); }}
                    className="flex-1 py-3 bg-slate-100 text-slate-600 font-black rounded-2xl hover:bg-slate-200 transition-all">ຍົກເລີກ</button>
                  <button onClick={startNewMonth}
                    className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-2xl shadow-lg transition-all active:scale-95">📅 ເລີ່ມໄດ້ເລີຍ</button>
                </div>
              </div>
            </div>
            );
          })()}

          {/* SAVE CONFLICT MODAL */}
          {saveConflict && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in">
              <div className="bg-white rounded-[32px] p-8 max-w-sm w-full shadow-2xl border border-slate-100 text-center">
                <div className="text-4xl mb-4">💾</div>
                <h3 className="text-xl font-black mb-2">ມີຂໍ້ມູນ "{saveConflict.label}" ຢູ່ແລ້ວ</h3>
                <p className="text-slate-500 font-bold text-sm mb-6">ທ່ານຕ້ອງການເຮັດຫຍັງ?</p>
                <div className="space-y-3">
                  <button onClick={() => saveCurrentSession(saveConflict.id)} className="w-full py-3 bg-rose-600 hover:bg-rose-700 text-white font-black rounded-2xl transition-all active:scale-95">🔄 ແທນທີ່ — Replace "{saveConflict.label}"</button>
                  <button onClick={() => saveCurrentSession(null)} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl transition-all active:scale-95">➕ Save ໃໝ່ — Keep Both</button>
                  <button onClick={() => setSaveConflict(null)} className="w-full py-3 bg-slate-100 text-slate-600 font-black rounded-2xl hover:bg-slate-200 transition-all">ຍົກເລີກ</button>
                </div>
              </div>
            </div>
          )}

          {/* RESET / DELETE CONFIRMATION */}
          {showConfirm && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in">
              <div className="bg-white rounded-[32px] p-8 max-w-sm w-full shadow-2xl border border-slate-100 text-center">
                <div className="w-16 h-16 rounded-full bg-rose-100 text-rose-600 mx-auto flex items-center justify-center mb-4 text-2xl">⚠️</div>
                <h3 className="text-xl font-black mb-2 uppercase">ຢືນຢັນ?</h3>
                <p className="text-slate-500 font-bold text-sm mb-6">
                  {showConfirm === 'advance' && <>ຕັ້ງ ເງິນເບີກ ທຸກຄົນໃຫ້ເປັນ <span className="text-blue-600">0</span></>}
                  {showConfirm === 'special' && <>ຕັ້ງ ໂບນັດພິເສດ ທຸກຄົນໃຫ້ເປັນ <span className="text-blue-600">0</span></>}
                  {showConfirm === 'clearWork' && <>ລ້າງຂໍ້ມູນ session ປະຈຸບັນທັງໝົດ (scan data + results)</>}
                  {showConfirm?.type === 'deleteSession' && <>ລຶບ session "<span className="text-rose-600">{showConfirm.label}</span>" ອອກ?</>}
                </p>
                <div className="flex gap-3">
                  <button onClick={() => setShowConfirm(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-black rounded-2xl hover:bg-slate-200 transition-all">ຍົກເລີກ</button>
                  <button onClick={() => {
                    if (showConfirm === 'advance') resetAllAdvances();
                    else if (showConfirm === 'special') resetAllSpecialBonuses();
                    else if (showConfirm === 'clearWork') { clearCurrentWork(); setShowConfirm(null); }
                    else if (showConfirm?.type === 'deleteSession') { deleteSession(showConfirm.id); setShowConfirm(null); }
                  }} className="flex-1 py-3 bg-rose-600 hover:bg-rose-700 text-white font-black rounded-2xl shadow-lg transition-all active:scale-95">
                    ຢືນຢັນ
                  </button>
                </div>
              </div>
            </div>
          )}

          <footer className="text-center py-10 opacity-30 text-[10px] font-black uppercase tracking-[0.3em]">
            Stable Payroll Engine — v4.1 Auto Sunday Detection
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
