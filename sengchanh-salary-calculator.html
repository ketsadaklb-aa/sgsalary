<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sengchanh Salary Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao+Looped:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Noto Sans Lao Looped', sans-serif; }
    .animate-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // ─── NumericInput ────────────────────────────────────────────────────────
    const NumericInput = ({ value, onChange, className, placeholder }) => {
      const format = (val) => {
        if (val === undefined || val === null || val === "") return "";
        const num = val.toString().replace(/,/g, "");
        return num.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      };
      const handleChange = (e) => {
        const rawValue = e.target.value.replace(/,/g, "");
        if (/^\d*$/.test(rawValue)) {
          onChange(rawValue === "" ? 0 : parseInt(rawValue));
        }
      };
      return (
        <input type="text" className={className} value={format(value)} onChange={handleChange} placeholder={placeholder} />
      );
    };

    // ─── DEFAULT DATA ────────────────────────────────────────────────────────
    const DEFAULT_EMPLOYEES = [
      { code: "6",  name: "Tun",        scan: 4, base: 3000000, special_bonus: 0,       advance: 150000  },
      { code: "7",  name: "Dam",        scan: 4, base: 5000000, special_bonus: 0,       advance: 400000  },
      { code: "9",  name: "Thongkham",  scan: 4, base: 5000000, special_bonus: 0,       advance: 0       },
      { code: "13", name: "Maih",       scan: 2, base: 6000000, special_bonus: 1080000, advance: 0       },
      { code: "14", name: "Ther",       scan: 2, base: 2500000, special_bonus: 0,       advance: 150000  },
      { code: "18", name: "Bounzu",     scan: 2, base: 8000000, special_bonus: 0,       advance: 0       },
      { code: "22", name: "Nik",        scan: 4, base: 3000000, special_bonus: 0,       advance: 1890000 },
      { code: "24", name: "Noy",        scan: 4, base: 4000000, special_bonus: 0,       advance: 0       },
      { code: "25", name: "Nut",        scan: 4, base: 3000000, special_bonus: 0,       advance: 150000  },
      { code: "30", name: "Mon",        scan: 4, base: 4000000, special_bonus: 0,       advance: 0       },
      { code: "37", name: "Korng",      scan: 4, base: 3000000, special_bonus: 0,       advance: 150000  },
      { code: "39", name: "Khammanh",   scan: 4, base: 5000000, special_bonus: 0,       advance: 2150000 },
      { code: "42", name: "Thongkeo",   scan: 4, base: 3000000, special_bonus: 0,       advance: 150000  },
      { code: "45", name: "Got",        scan: 4, base: 2500000, special_bonus: 0,       advance: 150000  },
      { code: "48", name: "Boy",        scan: 4, base: 0,       special_bonus: 0,       advance: 150000  },
      { code: "49", name: "Cho",        scan: 4, base: 3000000, special_bonus: 0,       advance: 0       },
      { code: "50", name: "Biw",        scan: 4, base: 1500000, special_bonus: 0,       advance: 350000  },
    ];

    const OT_MORNING  = 8 * 60;
    const OT_EVENING  = 18 * 60 + 30;
    const BREAK_MINS  = 40;
    const MID_DAY     = 12 * 60 + 30;

    const DEFAULT_MONTH = {
      label:     "ກຸມພາ 2026",
      year:      2026,
      month:     2,
      totalDays: 28,
      sundays:   4,
      otRate:    30000,
      holidays:  [],
    };

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    const parseTime = (s) => {
      if (!s || !s.trim()) return null;
      const raw = s.trim();
      const isPM = /pm/i.test(raw);
      const isAM = /am/i.test(raw);
      const cleaned = raw.replace(/\s*(am|pm)\s*/i, '').trim();
      const p = cleaned.split(":");
      if (p.length < 2) return null;
      let h = parseInt(p[0]), m = parseInt(p[1]);
      if (isNaN(h) || isNaN(m)) return null;
      if (isPM && h !== 12) h += 12;
      if (isAM && h === 12) h = 0;
      return h * 60 + m;
    };

    const formatMinsToClock = (m) => {
      if (m === null) return "--:--";
      const h = Math.floor(m / 60);
      const min = m % 60;
      return `${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
    };

    const getOrdinal = (n) => {
      const s = ["th", "st", "nd", "rd"], v = n % 100;
      return s[(v - 20) % 10] || s[v] || s[0];
    };

    const getDayInfo = (dateStr) => {
      if (!dateStr) return { isSunday: false, day: 0 };
      const delimiter = dateStr.includes("-") ? "-" : "/";
      const parts = dateStr.split(delimiter);
      if (parts.length !== 3) return { isSunday: false, day: 0 };
      let date;
      if (delimiter === "-") {
        const [y, m, d] = parts.map(Number);
        date = new Date(y, m - 1, d);
      } else {
        const [d, m, y] = parts.map(Number);
        date = new Date(y, m - 1, d);
      }
      return { isSunday: date.getDay() === 0, day: date.getDate(), dateObj: date };
    };

    const minsToH = (m) => m / 60;
    const fmtHours = (h) => {
      const t = Math.round(h * 60);
      return `${Math.floor(t / 60)}ຊມ ${String(t % 60).padStart(2, "0")}ນ`;
    };
    const fmt = (n) => Math.round(n).toLocaleString();

    const getClusters = (scans, threshold = 15) => {
      const sorted = scans.filter(s => typeof s === 'number' && isFinite(s)).sort((a, b) => a - b);
      if (sorted.length === 0) return [];
      const clusters = [[sorted[0]]];
      for (let i = 1; i < sorted.length; i++) {
        const lastCluster = clusters[clusters.length - 1];
        if (sorted[i] - lastCluster[lastCluster.length - 1] <= threshold) {
          lastCluster.push(sorted[i]);
        } else {
          clusters.push([sorted[i]]);
        }
      }
      return clusters;
    };

    // ─── LUNCH GAP DETECTION ────────────────────────────────────────────────────
    const findLunchPair = (sortedScans) => {
      // Find adjacent pair (gap 25–180 min) with midpoint closest to noon (12:30 = 750)
      const NOON = 750;
      let bestIdx = null, bestDist = Infinity;
      for (let i = 0; i < sortedScans.length - 1; i++) {
        const gap = sortedScans[i + 1] - sortedScans[i];
        if (gap >= 25 && gap <= 180) {
          const dist = Math.abs((sortedScans[i] + sortedScans[i + 1]) / 2 - NOON);
          if (dist < bestDist) { bestDist = dist; bestIdx = i; }
        }
      }
      return bestIdx; // index of OUT_AM scan; IN_PM is at bestIdx+1; null if no lunch gap found
    };

    // ─── CALCULATIONS ─────────────────────────────────────────────────────────
    const calcDay2Scan = (scans, eveLimit = OT_EVENING) => {
      const clusters = getClusters(scans);
      if (clusters.length < 2) return null;
      const F = clusters[0][0];
      const G = clusters[clusters.length - 1][clusters[clusters.length - 1].length - 1];
      if (G <= F) return null;
      const totalM = G - F;
      const morOT = Math.max(0, OT_MORNING - F);
      const eveOT = Math.max(0, G - eveLimit);
      const otM = morOT + eveOT;
      const netM = Math.max(0, totalM - BREAK_MINS - otM);
      let dayVal = 1.0;
      if (totalM < 300) dayVal = 0.5;
      return { otH: minsToH(otM), netM, dayVal };
    };

    const calcDay4Scan = (scans) => {
      const sorted = scans.filter(s => s !== null).sort((a, b) => a - b);
      if (sorted.length === 0) return null;
      const firstScan = sorted[0], lastScan = sorted[sorted.length - 1];
      let otH = 0;
      // Half-day: only morning or only afternoon
      if (lastScan < MID_DAY - 30) {
        const netM = Math.max(0, lastScan - Math.max(firstScan, OT_MORNING));
        return { otH, netM, dayVal: 0.5, isHalfDay: true };
      } else if (firstScan >= MID_DAY - 15) {
        const netM = Math.max(0, Math.min(lastScan, OT_EVENING) - firstScan);
        return { otH, netM, dayVal: 0.5, isHalfDay: true };
      }
      // Lunch gap detection: find adjacent pair closest to noon
      const lunchIdx = findLunchPair(sorted);
      if (lunchIdx !== null) {
        const F = sorted[0], G = sorted[lunchIdx], H = sorted[lunchIdx + 1];
        const hasOutPM = lunchIdx + 1 < sorted.length - 1;
        const usedSet = new Set([0, lunchIdx, lunchIdx + 1, ...(hasOutPM ? [sorted.length - 1] : [])]);
        const ignoredScanVals = new Set(sorted.filter((_, i) => !usedSet.has(i)));
        if (!hasOutPM) {
          // Only 3 effective scans — OUT_PM missing; signal for fill logic
          return { otH: 0, netM: 0, dayVal: 1.0, isHalfDay: false,
                   effectiveScanCount: 3, resolvedF: F, resolvedG: G, resolvedH: H, ignoredScanVals };
        }
        const I = sorted[sorted.length - 1];
        otH = minsToH(Math.max(0, OT_MORNING - F) + Math.max(0, I - OT_EVENING));
        const netM = Math.max(0, G - Math.max(F, OT_MORNING)) + Math.max(0, Math.min(I, OT_EVENING) - H);
        return { otH, netM, dayVal: 1.0, isHalfDay: false, resolvedG: G, resolvedH: H, ignoredScanVals };
      }
      // No lunch gap detected — fall back to cluster-based approach
      const clusters = getClusters(scans);
      if (clusters.length >= 4) {
        const F = clusters[0][0]; const G = clusters[1][clusters[1].length - 1];
        const H = clusters[clusters.length - 2][0]; const I = clusters[clusters.length - 1][clusters[clusters.length - 1].length - 1];
        otH = minsToH(Math.max(0, OT_MORNING - F) + Math.max(0, I - OT_EVENING));
        const netM = Math.max(0, G - Math.max(F, OT_MORNING)) + Math.max(0, Math.min(I, OT_EVENING) - H);
        return { otH, netM, dayVal: 1.0, isHalfDay: false, resolvedG: G, resolvedH: H };
      } else {
        otH = minsToH(Math.max(0, OT_MORNING - firstScan) + Math.max(0, lastScan - OT_EVENING));
        const netM = Math.min(lastScan, OT_EVENING) - Math.max(firstScan, OT_MORNING) - BREAK_MINS;
        return { otH, netM, dayVal: 1.0, isHalfDay: false };
      }
    };

    const detectScanMode = (data) => {
      const counts = data.map(row => row.scans.filter(s => s !== null).length).filter(c => c > 0);
      if (counts.length === 0) return 4;
      const avg = counts.reduce((a, b) => a + b, 0) / counts.length;
      return avg <= 2.5 ? 2 : 4;
    };

    const computeSalary = (emp, dailyRows, monthCfg) => {
      // Derive the true year/month from the actual CSV dateStr — never trust monthCfg alone
      let dataYear = monthCfg.year, dataMonth = monthCfg.month;
      for (const row of dailyRows) {
        const info = getDayInfo(row.dateStr);
        if (info.dateObj) { dataYear = info.dateObj.getFullYear(); dataMonth = info.dateObj.getMonth() + 1; break; }
      }
      const dataTotalDays = new Date(dataYear, dataMonth, 0).getDate();

      // All configured holidays count toward EXPECTED_DAYS (including Sunday ones)
      const holidayMap = new Map((monthCfg.holidays || [])
        .filter(h => { const d = typeof h === 'object' ? Number(h.date) : Number(h); return d >= 1 && d <= dataTotalDays; })
        .map(h => typeof h === 'object' ? [Number(h.date), h.name || ''] : [Number(h), '']));
      // Weekday holidays only get pay credit (Sunday holidays give no credit — already a free day)
      const weekdayHolidayCount = [...holidayMap.keys()]
        .filter(d => new Date(dataYear, dataMonth - 1, d).getDay() !== 0).length;
      // RATE_DAYS: auto-compute sundays from the actual data year/month
      let _sundays = 0;
      for (let _d = 1; _d <= dataTotalDays; _d++)
        if (new Date(dataYear, dataMonth - 1, _d).getDay() === 0) _sundays++;
      const RATE_DAYS = dataTotalDays - _sundays;
      // EXPECTED_DAYS: days employee is expected to attend (all holidays reduce this)
      const EXPECTED_DAYS = RATE_DAYS - holidayMap.size;
      const OT_RATE = monthCfg.otRate;

      // 2-scan standard A: 10h30m (630 min) span 8:00–18:30
      // 2-scan standard B: 9h00m (540 min) span 8:00–17:00 (shift85)
      // 4-scan standard:   9h50m (590 min) net work (630 gross − 40 min lunch)
      const is85Shift = emp.scan === 2 && emp.shift85 === true;
      const eveLimit2Scan = is85Shift ? 17 * 60 : OT_EVENING;
      const standardMinsPerDay = emp.scan === 4 ? 590 : is85Shift ? 540 : 630;
      // hourlyRate always based on RATE_DAYS — holidays never change the rate
      const hourlyRate = emp.base > 0 ? emp.base * 60 / (RATE_DAYS * standardMinsPerDay) : 0;

      let otH = 0, attendedDays = 0, totalPayMins = 0;
      const presenceMap = new Map();

      // Pre-pass: compute average scan times from complete days for filling missing scans
      let avgInTime = null, avgOutTime = null;
      let avg4InAM = null, avg4OutAM = null, avg4InPM = null, avg4OutPM = null;
      if (emp.scan === 2) {
        const completeDays = dailyRows.filter(r => getClusters(r.scans).length >= 2);
        if (completeDays.length > 0) {
          const ins  = completeDays.map(r => getClusters(r.scans)[0][0]);
          const outs = completeDays.map(r => { const c = getClusters(r.scans); return c[c.length-1][c[c.length-1].length-1]; });
          avgInTime  = Math.round(ins.reduce((a, b) => a + b, 0) / ins.length);
          avgOutTime = Math.round(outs.reduce((a, b) => a + b, 0) / outs.length);
        }
      } else if (emp.scan === 4) {
        const complete4 = dailyRows.filter(r => {
          const s = r.scans.filter(x => typeof x === 'number' && isFinite(x)).sort((a, b) => a - b);
          const li = findLunchPair(s);
          return li !== null && li + 1 < s.length - 1;
        });
        if (complete4.length > 0) {
          const avg = (arr) => Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
          avg4InAM  = avg(complete4.map(r => r.scans.filter(x => typeof x === 'number' && isFinite(x)).sort((a, b) => a - b)[0]));
          avg4OutAM = avg(complete4.map(r => { const s = r.scans.filter(x => typeof x === 'number' && isFinite(x)).sort((a, b) => a - b); return s[findLunchPair(s)]; }));
          avg4InPM  = avg(complete4.map(r => { const s = r.scans.filter(x => typeof x === 'number' && isFinite(x)).sort((a, b) => a - b); return s[findLunchPair(s) + 1]; }));
          avg4OutPM = avg(complete4.map(r => r.scans.filter(x => typeof x === 'number' && isFinite(x)).sort((a, b) => a - b).slice(-1)[0]));
        }
      }

      for (const row of dailyRows) {
        const info = getDayInfo(row.dateStr);
        const validCount = row.scans.filter(s => s !== null).length;
        if (validCount > 0) {
          const clusters = getClusters(row.scans);
          const res = emp.scan === 2 ? calcDay2Scan(row.scans, eveLimit2Scan) : calcDay4Scan(row.scans);
          let warning = "";
          let usedClusterIdxs = new Set();

          if (!res) {
            // 2-scan with only 1 cluster — try to fill missing scan with monthly average
            const singleTime = clusters[0][0];
            const isSingleIN = singleTime < MID_DAY;
            if (avgInTime !== null && avgOutTime !== null) {
              const filledTime  = isSingleIN ? avgOutTime : avgInTime;
              const filledScans = isSingleIN ? [singleTime, avgOutTime] : [avgInTime, singleTime];
              const filledRes   = calcDay2Scan(filledScans, eveLimit2Scan);
              if (filledRes) {
                const noteType = isSingleIN ? 'OUT' : 'IN';
                warning = `ສະແກນດຽວ → ໃຊ້ ${noteType} ສະເລ່ຍ [${formatMinsToClock(filledTime)}]`;
                usedClusterIdxs.add(0);
                presenceMap.set(info.day, { ...row, warning, validCount, dayVal: filledRes.dayVal, netM: filledRes.netM, clusters, usedClusterIdxs, filledScan: { time: filledTime, type: noteType } });
                if (info.isSunday) {
                  // Sunday attendance tracked but no pay adjustment
                } else if (holidayMap.has(info.day)) {
                  if (!emp.no_ot) otH += filledRes.otH;
                } else {
                  attendedDays += filledRes.dayVal;
                  if (!emp.no_ot) otH += filledRes.otH;
                  const payMins2 = Math.min(filledRes.netM + BREAK_MINS, standardMinsPerDay);
                  totalPayMins += payMins2;

                }
              } else {
                warning = "ສະແກນດຽວ (ຂາດ)";
                presenceMap.set(info.day, { ...row, warning, validCount, dayVal: 0, netM: 0, clusters, usedClusterIdxs, countAsAbsent: true });
              }
            } else {
              // No average available yet — treat as absent
              warning = "ສະແກນດຽວ (ຂາດ)";
              presenceMap.set(info.day, { ...row, warning, validCount, dayVal: 0, netM: 0, clusters, usedClusterIdxs, countAsAbsent: true });
            }
          } else {
            let effectiveRes = res;
            let filledScan4 = null;
            const effectiveCount = res.effectiveScanCount ?? clusters.length;

            if (res.isHalfDay) {
              warning = "ມາເຄິ່ງວັນ (0.5)";
              usedClusterIdxs.add(0);
              usedClusterIdxs.add(clusters.length - 1);
            } else if (effectiveCount < emp.scan) {
              // Try to fill missing 4-scan data with monthly averages
              if (emp.scan === 4 && avg4InAM !== null && Number.isFinite(avg4InAM) && Number.isFinite(avg4OutPM)) {
                const n = effectiveCount;
                let filledTimes = null, entries = [];
                if (n === 3) {
                  if (res.resolvedH !== undefined) {
                    // Lunch gap detected: have IN_AM, OUT_AM, IN_PM — missing OUT_PM
                    filledTimes = [res.resolvedF, res.resolvedG, res.resolvedH, avg4OutPM];
                    entries = [{ time: avg4OutPM, type: 'OUT_PM' }];
                  } else {
                    const midRep = (clusters[1][0] + clusters[1][clusters[1].length-1]) / 2;
                    if (midRep < MID_DAY) {
                      filledTimes = [clusters[0][0], clusters[1][clusters[1].length-1], avg4InPM, clusters[2][clusters[2].length-1]];
                      entries = [{ time: avg4InPM, type: 'IN_PM' }];
                    } else {
                      filledTimes = [clusters[0][0], avg4OutAM, clusters[1][0], clusters[2][clusters[2].length-1]];
                      entries = [{ time: avg4OutAM, type: 'OUT_AM' }];
                    }
                  }
                } else if (n === 2) {
                  filledTimes = [clusters[0][0], avg4OutAM, avg4InPM, clusters[1][clusters[1].length-1]];
                  entries = [{ time: avg4OutAM, type: 'OUT_AM' }, { time: avg4InPM, type: 'IN_PM' }];
                }
                if (filledTimes) {
                  const tryRes = calcDay4Scan(filledTimes);
                  if (tryRes && !tryRes.isHalfDay) {
                    effectiveRes = tryRes;
                    filledScan4 = entries;
                    warning = `ສະແກນ ${n}/4 → ໃຊ້ສະເລ່ຍ: ${entries.map(e => `${e.type} [~${formatMinsToClock(e.time)}]`).join(', ')}`;
                    clusters.forEach((_, i) => usedClusterIdxs.add(i));
                  }
                }
              }
              if (!filledScan4) {
                const usedIn  = formatMinsToClock(clusters[0][0]);
                const usedOut = formatMinsToClock(clusters[clusters.length - 1][clusters[clusters.length - 1].length - 1]);
                warning = `ສະແກນ ${effectiveCount}/${emp.scan} → [${usedIn}–${usedOut}]`;
                usedClusterIdxs.add(0);
                usedClusterIdxs.add(clusters.length - 1);
              }
            } else if (effectiveCount > emp.scan) {
              warning = `ສະແກນ ${clusters.length} ຄັ້ງ (ເກີນ ${emp.scan})`;
              if (emp.scan === 2) {
                usedClusterIdxs.add(0);
                usedClusterIdxs.add(clusters.length - 1);
              } else {
                clusters.forEach((_, i) => usedClusterIdxs.add(i));
              }
            } else {
              clusters.forEach((_, i) => usedClusterIdxs.add(i));
            }

            presenceMap.set(info.day, { ...row, warning, validCount, dayVal: effectiveRes.dayVal, netM: effectiveRes.netM, clusters, usedClusterIdxs,
              ...(filledScan4 && { filledScan4 }),
              ...(res.ignoredScanVals && { ignoredScanVals: res.ignoredScanVals }),
              ...(res.resolvedG !== undefined && { resolvedG: res.resolvedG }),
              ...(res.resolvedH !== undefined && { resolvedH: res.resolvedH }),
            });

            if (info.isSunday) {
              // Sunday attendance
            } else if (holidayMap.has(info.day)) {
              // Holiday: still track OT if they came in, but base pay handled via credit below
              if (!emp.no_ot) otH += effectiveRes.otH;
            } else {
              attendedDays += effectiveRes.dayVal;
              if (!emp.no_ot) otH += effectiveRes.otH;
              // Hourly pay: capped at standardMinsPerDay so OT never compensates for absent days
              const payMins = Math.min(emp.scan === 2 ? effectiveRes.netM + BREAK_MINS : effectiveRes.netM, standardMinsPerDay);
              totalPayMins += payMins;

            }
          }
        }
      }

      const absentDates = [];
      for (let d = 1; d <= dataTotalDays; d++) {
        const dateObj = new Date(dataYear, dataMonth - 1, d);
        if (dateObj.getDay() === 0) continue;
        if (holidayMap.has(d)) continue; // public holiday — not counted as absent
        const dayLog = presenceMap.get(d);
        if (!dayLog || dayLog.countAsAbsent) absentDates.push(d);
      }

      // Holiday credit: only weekday holidays give pay credit (Sunday holidays = already free)
      const holidayCredit = weekdayHolidayCount * standardMinsPerDay;
      // Max possible pay = full RATE_DAYS worth of standard minutes
      const maxPayMins = RATE_DAYS * standardMinsPerDay;
      const cappedPayMins = Math.min(totalPayMins + holidayCredit, maxPayMins);

      // Manual add-back hours (no OT — fills up to the cap only)
      const addbackRawMins = Math.round((emp.addback_hrs || 0) * 60);
      const addbackApplied = Math.max(0, Math.min(addbackRawMins, maxPayMins - cappedPayMins));
      const totalPayMinsWithAddback = cappedPayMins + addbackApplied;

      const basePay = emp.base;
      const dailyRateKip = Math.round(standardMinsPerDay * hourlyRate / 60);
      const rawWorkPay = Math.min(Math.round(totalPayMinsWithAddback * hourlyRate / 60), basePay);
      // Absent penalty: 2× per absent day (extra 1× on top of the hours already not counted)
      const absentPenalty = absentDates.length * dailyRateKip;
      const workPay = Math.max(0, rawWorkPay - absentPenalty);
      const absentDeduction = Math.round(basePay - workPay);
      const qualifiesForBonus = !emp.no_ot && (emp.ot_bonus_enabled !== false) && otH >= 15 && absentDates.length === 0;
      const otPay = qualifiesForBonus ? 0 : otH * OT_RATE;
      const otBonus = qualifiesForBonus ? 1000000 : 0;
      const totalGross = workPay + otPay + (emp.special_bonus || 0) + otBonus;
      const netPay = totalGross - (emp.advance || 0);

      return {
        ...emp,
        attended: attendedDays,
        absent: absentDates.length,
        otH,
        basePay,
        dailyRateKip,
        rawWorkPay,
        absentPenalty,
        workPay,
        absentDeduction,
        hourlyRate,
        totalPayMins: totalPayMinsWithAddback,
        addbackApplied,
        standardMinsPerDay,
        otPay,
        otBonus,
        totalGross,
        netPay,
        absentDates,

        dailyLog: presenceMap,
        workingDays: EXPECTED_DAYS,
        rateDays: RATE_DAYS,
        scanMode: emp.scan,
        dataYear,
        dataMonth,
        dataTotalDays,
        hasIssues: Array.from(presenceMap.values()).some(l => l.warning !== ""),
      };
    };

    // ─── PERSISTENCE HELPERS ─────────────────────────────────────────────────
    const loadEmployees = () => {
      try {
        const saved = localStorage.getItem("ssc_employees");
        if (saved) return JSON.parse(saved);
      } catch {}
      return DEFAULT_EMPLOYEES;
    };

    const saveEmployees = (list) => {
      try { localStorage.setItem("ssc_employees", JSON.stringify(list)); } catch {}
    };

    const loadMonthCfg = () => {
      try {
        const saved = localStorage.getItem("ssc_monthCfg");
        return saved ? JSON.parse(saved) : DEFAULT_MONTH;
      } catch { return DEFAULT_MONTH; }
    };
    const saveMonthCfg = (cfg) => {
      try { localStorage.setItem("ssc_monthCfg", JSON.stringify(cfg)); } catch {}
    };

    const loadCurrentScanData = () => {
      try {
        const saved = localStorage.getItem("ssc_currentScanData");
        return saved ? JSON.parse(saved) : null;
      } catch { return null; }
    };
    const saveCurrentScanData = (data) => {
      try { localStorage.setItem("ssc_currentScanData", JSON.stringify(data)); } catch {}
    };

    const loadSessions = () => {
      try { return JSON.parse(localStorage.getItem("ssc_sessions") || "[]"); } catch { return []; }
    };
    const saveSessions = (list) => {
      try { localStorage.setItem("ssc_sessions", JSON.stringify(list)); } catch {}
    };

    // ─── AUTH HELPERS ─────────────────────────────────────────────────────────
    const AUTH_SESSION_KEY = 'ssc_auth_session';

    const getAuthSession = () => {
      try { return JSON.parse(sessionStorage.getItem(AUTH_SESSION_KEY) || 'null'); } catch { return null; }
    };
    const setAuthSession = (user) => {
      try { sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify({ username: user.username, role: user.role })); } catch {}
    };
    const clearAuthSession = () => {
      try { sessionStorage.removeItem(AUTH_SESSION_KEY); } catch {}
    };

    // ─── API HELPER ───────────────────────────────────────────────────────────
    const apiCall = async (method, endpoint, body) => {
      try {
        const opts = { method, headers: {} };
        if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
        const r = await fetch(endpoint, opts);
        const data = await r.json().catch(() => null);
        return { ok: r.ok, status: r.status, data };
      } catch { return { ok: false, status: 0, data: null }; }
    };

    // ─── LOGIN SCREEN ──────────────────────────────────────────────────────────
    const LoginScreen = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [showPw, setShowPw] = useState(false);
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true); setError('');
        const result = await apiCall('POST', '/api/auth/login', { username: username.trim(), password });
        setLoading(false);
        if (result.ok) {
          setAuthSession(result.data);
          onLogin(result.data);
        } else {
          setError(result.data?.error || 'ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ');
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-900 to-indigo-900 flex items-center justify-center p-6">
          <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-sm">
            <div className="text-center mb-8">
              <div className="text-5xl mb-3">🏦</div>
              <h1 className="text-xl font-black uppercase tracking-tight">Sengchanh Salary</h1>
              <p className="text-slate-400 font-bold text-xs mt-1 uppercase tracking-widest">ເຂົ້າສູ່ລະບົບ / Sign In</p>
            </div>
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">ຊື່ຜູ້ໃຊ້ / Username</label>
                <input
                  type="text" autoFocus autoComplete="username"
                  value={username} onChange={e => { setUsername(e.target.value); setError(''); }}
                  className="w-full p-3 border-2 rounded-xl font-bold focus:border-blue-500 outline-none transition-colors"
                  placeholder="admin"
                />
              </div>
              <div>
                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">ລະຫັດຜ່ານ / Password</label>
                <div className="relative">
                  <input
                    type={showPw ? 'text' : 'password'} autoComplete="current-password"
                    value={password} onChange={e => { setPassword(e.target.value); setError(''); }}
                    className="w-full p-3 border-2 rounded-xl font-bold focus:border-blue-500 outline-none pr-10 transition-colors"
                    placeholder="••••••••"
                  />
                  <button type="button" tabIndex={-1} onClick={() => setShowPw(v => !v)}
                    className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 text-sm font-black">
                    {showPw ? '🙈' : '👁️'}
                  </button>
                </div>
              </div>
              {error && <p className="text-rose-600 font-bold text-sm text-center bg-rose-50 rounded-xl py-2 px-3">{error}</p>}
              <button type="submit" disabled={loading}
                className="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-black rounded-2xl transition-all active:scale-95 mt-2">
                {loading ? '⏳ ກຳລັງກວດສອບ...' : 'ເຂົ້າສູ່ລະບົບ →'}
              </button>
            </form>
          </div>
        </div>
      );
    };

    // ─── SLIP BODY (pure component, no hooks) ────────────────────────────────
    const SlipBody = ({ emp, monthCfg }) => {
      const dailyRate = emp.base > 0 ? emp.base / emp.workingDays : 0;
      const BREAK = 40;
      const stdMins = emp.standardMinsPerDay;
      const LAO_DAYS = ['ອາ','ຈ','ອ','ພ','ພຫ','ສຸກ','ສ'];
      const slipHolidayMap = new Map((monthCfg.holidays || []).map(h => typeof h === 'object' ? [Number(h.date), h.name || ''] : [Number(h), '']));
      // Use the actual year/month from the computed salary data — not monthCfg which may be stale
      const slipYear = emp.dataYear || monthCfg.year;
      const slipMonth = emp.dataMonth || monthCfg.month;
      const slipTotalDays = emp.dataTotalDays || monthCfg.totalDays;
      const LAO_MONTHS_SLIP = ["ມັງກອນ","ກຸມພາ","ມີນາ","ເມສາ","ພຶດສະພາ","ມິຖຸນາ","ກໍລະກົດ","ສິງຫາ","ກັນຍາ","ຕຸລາ","ພະຈິກ","ທັນວາ"];
      const slipLabel = `${LAO_MONTHS_SLIP[slipMonth - 1]} ${slipYear}`;
      let slipSundays = 0;
      for (let _d = 1; _d <= slipTotalDays; _d++)
        if (new Date(slipYear, slipMonth - 1, _d).getDay() === 0) slipSundays++;
      const deductionRows = [];
      const rawRows = [];
      for (let d = 1; d <= slipTotalDays; d++) {
        const date = new Date(slipYear, slipMonth - 1, d);
        const isSun = date.getDay() === 0;
        const isHoliday = slipHolidayMap.has(d);
        const holidayName = slipHolidayMap.get(d) || 'ວັນພັກລາດຊະການ';
        const log = emp.dailyLog.get(d);
        rawRows.push({ day: d, dayName: LAO_DAYS[date.getDay()], isSun, isHoliday, holidayName, log });
        if (isSun || isHoliday) continue;
        const isAbsent = !log || log.validCount === 0 || log.countAsAbsent;
        if (isAbsent) {
          const deduct = Math.round(2 * stdMins * emp.hourlyRate / 60);
          deductionRows.push({ day: d, reason: 'ຂາດວຽກ (×2)', shortMins: stdMins, deduct });
        } else {
          const payMins = emp.scanMode === 2 ? log.netM + BREAK : log.netM;
          const shortMins = Math.max(0, stdMins - payMins);
          if (shortMins > 0) {
            const clusters = log.clusters || [];
            const firstScan = clusters.length > 0 ? clusters[0][0] : null;
            const lastC = clusters.length > 0 ? clusters[clusters.length - 1] : null;
            const lastScan = lastC ? lastC[lastC.length - 1] : null;
            const eveLimit = emp.shift85 ? 1020 : 1110;
            if (emp.scanMode === 4 && (log.resolvedG !== undefined || clusters.length >= 4)) {
              const G = log.resolvedG ?? clusters[1][clusters[1].length - 1];
              const H = log.resolvedH ?? clusters[2][0];
              const lunchDur = H - G;
              const lunchExcess = Math.max(0, lunchDur - BREAK);
              const lateMorning = firstScan !== null ? Math.max(0, firstScan - 480) : 0;
              const earlyOut = lastScan !== null ? Math.max(0, eveLimit - lastScan) : 0;
              if (lunchExcess > 0) deductionRows.push({ day: d, reason: `ກິນເຂົ້າສວຍເກີນເວລາ (${lunchDur}ນທ − 40ນທ)`, shortMins: lunchExcess, deduct: Math.round(lunchExcess * emp.hourlyRate / 60) });
              if (lateMorning > 0) deductionRows.push({ day: d, reason: 'ມາຊ້າ', shortMins: lateMorning, deduct: Math.round(lateMorning * emp.hourlyRate / 60) });
              if (earlyOut > 0) deductionRows.push({ day: d, reason: 'ກັບໄວ', shortMins: earlyOut, deduct: Math.round(earlyOut * emp.hourlyRate / 60) });
            } else {
              const parts = [];
              if (firstScan !== null && firstScan > 480) parts.push('ມາຊ້າ');
              if (lastScan !== null && lastScan < eveLimit) parts.push('ກັບໄວ');
              const reason = parts.length > 0 ? parts.join(' + ') : 'ໜ້ອຍກວ່າມາດຕະຖານ';
              deductionRows.push({ day: d, reason, shortMins, deduct: Math.round(shortMins * emp.hourlyRate / 60) });
            }
          }
        }
      }

      return (
        <div className="bg-white rounded-2xl p-8 shadow-sm" style={{fontFamily:"'Noto Sans Lao Looped', sans-serif"}}>
                {/* HEADER */}
                <div className="text-center border-b-2 border-slate-200 pb-6 mb-6">
                  <h1 className="text-2xl font-black uppercase tracking-tight text-slate-900">Sengchanh Salary Calculator</h1>
                  <p className="text-slate-500 font-bold text-sm mt-1">ໃບແຈ້ງເງິນເດືອນ / Salary Slip</p>
                  <p className="text-lg font-black text-blue-700 mt-2">{slipLabel}</p>
                </div>
                {/* EMPLOYEE INFO */}
                <div className="grid grid-cols-2 gap-3 mb-4 bg-slate-50 rounded-xl p-4">
                  <div>
                    <p className="text-[10px] font-black text-slate-400 uppercase">ພະນັກງານ</p>
                    <p className="font-black text-lg">{emp.name}</p>
                  </div>
                  <div>
                    <p className="text-[10px] font-black text-slate-400 uppercase">ລະຫັດ</p>
                    <p className="font-black text-lg">#{emp.code}</p>
                  </div>
                  <div>
                    <p className="text-[10px] font-black text-slate-400 uppercase">ຖານເງິນເດືອນ</p>
                    <p className="font-black text-blue-700">{fmt(emp.base)} ກີບ</p>
                  </div>
                  <div>
                    <p className="text-[10px] font-black text-slate-400 uppercase">ອັດຕາ / ຕ້ອງມາ</p>
                    <p className="font-black">{emp.rateDays} <span className="text-slate-400 font-bold text-xs">/ {emp.workingDays} ວັນ</span></p>
                    <p className="text-[9px] text-slate-400 font-bold">{emp.rateDays} ວັນ = ອັດຕາ, {emp.workingDays} ວັນ = ຕ້ອງມາ (ຫຼັງຫັກພັກ)</p>
                  </div>
                </div>
                {/* MONTH CALENDAR SUMMARY */}
                {(() => {
                  const allHolidays = (monthCfg.holidays || [])
                    .filter(h => { const d = typeof h === 'object' ? Number(h.date) : Number(h); return d >= 1 && d <= slipTotalDays; })
                    .map(h => {
                      const obj = typeof h === 'object' ? h : { date: h, name: '' };
                      const d = Number(obj.date);
                      const isSun = new Date(slipYear, slipMonth - 1, d).getDay() === 0;
                      return { ...obj, date: d, isSun };
                    });
                  const effectiveCount = allHolidays.length;
                  const sundayCount = allHolidays.filter(h => h.isSun).length;
                  return (
                    <div className="mb-6 rounded-xl border border-slate-200 overflow-hidden">
                      <div className="bg-slate-800 text-white px-4 py-2 flex justify-between items-center">
                        <span className="font-black text-xs uppercase tracking-widest">ສະຫຼຸບເດືອນ {slipLabel}</span>
                        <span className="text-slate-400 text-[10px] font-bold">ອັດຕາ {fmt(emp.base)} ÷ {emp.rateDays} ວັນ = {fmt(Math.round(emp.base / emp.rateDays))} ກີບ/ວັນ</span>
                      </div>
                      <div className="grid grid-cols-4 divide-x divide-slate-100 text-center text-xs">
                        <div className="p-3">
                          <p className="text-slate-400 font-bold text-[9px] uppercase mb-1">ທັງໝົດ</p>
                          <p className="font-black text-base text-slate-700">{slipTotalDays}</p>
                          <p className="text-[9px] text-slate-400">ວັນໃນເດືອນ</p>
                        </div>
                        <div className="p-3">
                          <p className="text-slate-400 font-bold text-[9px] uppercase mb-1">ໝົດ ອາທິດ</p>
                          <p className="font-black text-base text-slate-500">− {slipSundays}</p>
                          <p className="text-[9px] text-slate-400">ວັນອາທິດ (Auto)</p>
                        </div>
                        <div className="p-3 bg-amber-50">
                          <p className="text-amber-600 font-bold text-[9px] uppercase mb-1">🏖️ ວັນພັກ</p>
                          <p className="font-black text-base text-amber-600">− {effectiveCount}</p>
                          <p className="text-[9px] text-amber-500">
                            {allHolidays.length > 0
                              ? allHolidays.map(h => h.isSun ? `ວທ${h.date}(ວ/ອ)` : `ວທ${h.date}`).join(', ')
                              : 'ບໍ່ມີ'}
                          </p>
                        </div>
                        <div className="p-3 bg-blue-50">
                          <p className="text-blue-600 font-bold text-[9px] uppercase mb-1">ຕ້ອງມາ</p>
                          <p className="font-black text-base text-blue-700">= {emp.workingDays}</p>
                          <p className="text-[9px] text-blue-500">ວັນເຮັດວຽກ</p>
                        </div>
                      </div>
                      {allHolidays.length > 0 && (
                        <div className="bg-amber-50 border-t border-amber-100 px-4 py-2 flex flex-wrap gap-2 items-center">
                          {allHolidays.map((h, i) => (
                            <span key={i} className={`text-[9px] font-black px-2 py-0.5 rounded-lg ${h.isSun ? 'bg-slate-200 text-slate-600' : 'bg-amber-200 text-amber-900'}`}>
                              🏖️ ວທ {h.date}{h.name ? ` — ${h.name}` : ''}{h.isSun ? ' (ຕົກ ວ/ອ)' : ''}
                            </span>
                          ))}
                          {sundayCount > 0
                            ? <span className="text-[9px] text-slate-500 font-bold ml-auto">ຕົກ ວ/ອ: ຫັກວັນເຮັດວຽກ ແຕ່ບໍ່ໄດ້ຮັບສິດເຄຣດິດຊົ່ວໂມງ</span>
                            : <span className="text-[9px] text-amber-700 font-bold ml-auto">ວັນພັກ = ໄດ້ຮັບເງິນເດືອນປົກກະຕິ ບໍ່ຖືວ່າຂາດ</span>
                          }
                        </div>
                      )}
                    </div>
                  );
                })()}
                {/* ATTENDANCE */}
                <div className="mb-6">
                  <h3 className="font-black text-sm uppercase tracking-widest text-slate-500 border-b pb-2 mb-3">ການເຂົ້າວຽກ</h3>
                  <div className="grid grid-cols-2 gap-2 text-sm mb-3">
                    <div className="flex justify-between bg-emerald-50 rounded-lg px-3 py-2">
                      <span className="font-bold text-slate-600">ວັນທີ່ມາ <span className="text-[9px] text-emerald-500">(ມາຕົວຈິງ / ຕ້ອງມາ)</span></span>
                      <span className="font-black text-emerald-700">{emp.attended} / {emp.workingDays} ວັນ</span>
                    </div>
                    <div className="flex justify-between bg-rose-50 rounded-lg px-3 py-2">
                      <span className="font-bold text-slate-600">ວັນຂາດ <span className="text-[9px] text-rose-400">(ຫັກເງິນ)</span></span>
                      <span className="font-black text-rose-700">{emp.absent} ວັນ</span>
                    </div>
                    <div className="flex justify-between bg-purple-50 rounded-lg px-3 py-2">
                      <span className="font-bold text-slate-600">OT ທັງໝົດ</span>
                      <span className="font-black text-purple-700">{fmtHours(emp.otH)}</span>
                    </div>
                  </div>
                  {emp.absentDates.length > 0 && (
                    <div className="bg-rose-50 border border-rose-200 rounded-xl p-3">
                      <p className="text-[10px] font-black text-rose-600 uppercase mb-1">ວັນທີ່ຂາດ (ລາຍລະອຽດ)</p>
                      <p className="text-sm font-bold text-rose-800 leading-relaxed">
                        {emp.absentDates.map(d => `${d}${getOrdinal(d)}`).join(", ")} — {slipLabel}
                      </p>
                    </div>
                  )}
                </div>
                {/* WORK HOURS PROGRESS */}
                {(() => {
                  const targetMins = emp.rateDays * emp.standardMinsPerDay;
                  const actualMins = emp.totalPayMins;
                  const pct = Math.min(100, Math.round(actualMins / targetMins * 100));
                  const shortMins = Math.max(0, targetMins - actualMins);
                  const holidayCount = (monthCfg.holidays || []).filter(h => {
                    const d = typeof h === 'object' ? Number(h.date) : Number(h);
                    return d >= 1 && d <= slipTotalDays && new Date(slipYear, slipMonth - 1, d).getDay() !== 0;
                  }).length;
                  const barColor = pct >= 95 ? 'bg-emerald-500' : pct >= 80 ? 'bg-amber-400' : 'bg-rose-500';
                  const textColor = pct >= 95 ? 'text-emerald-700' : pct >= 80 ? 'text-amber-700' : 'text-rose-700';
                  const bgColor = pct >= 95 ? 'bg-emerald-50 border-emerald-200' : pct >= 80 ? 'bg-amber-50 border-amber-200' : 'bg-rose-50 border-rose-200';
                  return (
                    <div className={`mb-6 border rounded-xl p-4 ${bgColor}`}>
                      <h3 className="font-black text-sm uppercase tracking-widest text-slate-500 mb-3">ຊົ່ວໂມງວຽກ / Work Hours</h3>
                      <div className="flex justify-between text-xs font-black text-slate-500 mb-1">
                        <span>ເປົ້າໝາຍ: {emp.rateDays} ວັນ × {fmtHours(emp.standardMinsPerDay / 60)} = <span className="text-slate-700">{fmtHours(targetMins / 60)}</span></span>
                        <span className={`text-base font-black ${textColor}`}>{pct}%</span>
                      </div>
                      <div className="w-full bg-slate-200 rounded-full h-4 mb-2 overflow-hidden">
                        <div className={`h-4 rounded-full transition-all ${barColor}`} style={{width: `${pct}%`}}></div>
                      </div>
                      <div className="flex justify-between text-xs font-bold">
                        <span className={textColor}>ຕົວຈິງ: <span className="font-black">{fmtHours(actualMins / 60)}</span>
                          {holidayCount > 0 && <span className="text-amber-600 ml-1">(incl. 🏖️ {fmtHours(holidayCount * emp.standardMinsPerDay / 60)} ພັກລາດຊະການ)</span>}
                        </span>
                        {shortMins > 0
                          ? <span className="text-rose-600 font-black">ຫຼຸດ {fmtHours(shortMins / 60)} → ຫັກ {fmt(emp.absentDeduction)} ກີບ</span>
                          : <span className="text-emerald-600 font-black">✅ ຄົບຊົ່ວໂມງ — ເງິນເດືອນເຕັມ</span>
                        }
                      </div>
                    </div>
                  );
                })()}
                {/* EARNINGS */}
                <div className="mb-6">

                              <td className="px-2 py-1 text-center font-mono">{!skip && !isAbsent && (log?.resolvedH != null || clusters.length >= 3) ? formatMinsToClock(log?.resolvedH ?? clusters[clusters.length-2][0]) : '—'}</td>
                              <td className="px-2 py-1 text-center font-mono">{!skip && !isAbsent && clusters.length >= 2 ? formatMinsToClock(clusters[clusters.length-1][clusters[clusters.length-1].length-1]) : '—'}</td>

    // ─── PDF HELPER ───────────────────────────────────────────────────────────
    const canvasToSlipPDF = (canvas) => {
      const { jsPDF } = window.jspdf;
      const JPEG_QUALITY = 0.85;
      const margin = 10;
      const pageW = 210; // A4 width in mm
      const imgW = pageW - margin * 2;
      const imgH = (canvas.height * imgW) / canvas.width;
      const pageH = imgH + margin * 2; // page height = content height, no cuts
      const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: [pageW, pageH] });
      pdf.addImage(canvas.toDataURL("image/jpeg", JPEG_QUALITY), "JPEG", margin, margin, imgW, imgH);
      return pdf;
    };

    // ─── SLIP MODAL ───────────────────────────────────────────────────────────
    const SlipModal = ({ emp, monthCfg, onClose }) => {
      const slipRef = useRef();
      const [generating, setGenerating] = useState(false);

      const generatePDF = async () => {
        setGenerating(true);
        try {
          const canvas = await html2canvas(slipRef.current, { scale: 1.5, useCORS: true, backgroundColor: "#ffffff" });
          canvasToSlipPDF(canvas).save(`salary-slip-${emp.name}-${monthCfg.label}.pdf`);
        } catch (e) {
          alert("PDF generation failed: " + e.message);
        }
        setGenerating(false);
      };

      return (
        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm animate-in">
          <div className="bg-white w-full max-w-2xl max-h-[95vh] rounded-[32px] shadow-2xl overflow-hidden flex flex-col">
            <div className="p-5 bg-slate-900 text-white flex justify-between items-center flex-shrink-0">
              <h2 className="font-black text-lg uppercase tracking-widest">Salary Slip — {emp.name}</h2>
              <div className="flex gap-2">
                <button onClick={generatePDF} disabled={generating}
                  className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl text-sm font-black flex items-center gap-2 disabled:opacity-50 transition-all active:scale-95">
                  {generating ? "⏳ Generating..." : "⬇️ Download PDF"}
                </button>
                <button onClick={onClose} className="bg-white/10 hover:bg-white/20 w-10 h-10 rounded-xl flex items-center justify-center font-black transition-all">✕</button>
              </div>
            </div>
            <div className="flex-1 overflow-y-auto p-6 bg-slate-100">
              <div ref={slipRef}>
                <SlipBody emp={emp} monthCfg={monthCfg} />
              </div>
            </div>
          </div>
        </div>
      );
